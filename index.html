<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Személyes Oldalam</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 10vh 20px;
            text-align: center;
            background-color: #f9f9f9;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #24292e;
        }
        p {
            font-size: 1.2em;
            color: #586069;
            margin-bottom: 30px;
        }
        .links a {
            margin: 0 15px;
            text-decoration: none;
            color: #0366d6;
            font-weight: 600;
            transition: color 0.2s ease;
        }
        .links a:hover {
            color: #005cc5;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Szia, a nevem [A Te Neved]! 👋</h1>
        <p>Szoftverfejlesztő | Tech rajongó | Kávé imádó</p>
        <div class="links">
            <a href="https://github.com/felhasznaloneved">GitHub</a>
            <a href="#">LinkedIn</a>
            <a href="mailto:email@cimed.hu">Kapcsolat</a>
        </div>
    </div>
</body>
</html>
